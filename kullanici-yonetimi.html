<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kullanıcı Yönetimi</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <header class="navbar">
        <div class="logo">
            <a href="index.html">ÇUKUROVA</a>
        </div>
        <div class="nav-container">
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html">Ana Sayfa</a></li>
                    <li><a href="uretim-takip.html">Üretim Takip Paneli</a></li>
                    <li><a href="sevk-edilenler.html">Sevk Edilen Makinalar</a></li>
                    <li class="admin-only"><a href="kullanici-yonetimi.html">Kullanıcı Yönetimi</a></li>
                </ul>
            </nav>
            <div class="user-actions">
                <span id="user-email" class="user-email"></span>
                <button id="logout-btn" class="logout-btn">Çıkış Yap</button>
            </div>
        </div>
        <div class="hamburger">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </div>
    </header>

    <main class="content">
        <div id="user-management-container">
            <h1>Kullanıcı Yönetimi</h1>
            <div class="user-management-layout">
                <!-- Yeni Kullanıcı Ekleme Formu -->
                <div class="form-container">
                    <h2>Yeni Kullanıcı Oluştur</h2>
                    <form id="create-user-form">
                        <div class="form-group">
                            <input type="email" class="new-user-mail" id="new-user-email" placeholder="e-posta" required>
                        </div>
                        <div class="form-group">

                            <input type="password" class="new-user-mail" id="new-user-password" placeholder="şifre" required>
                        </div>
                        <div class="form-group">
                            <label for="new-user-role">Rol</label>
                            <select id="new-user-role" required>
                                <option value="montaj">Montaj</option>
                                <option value="kalite">Kalite</option>
                                <option value="admin">Admin</option>
                            </select>
                        </div>
                        <button type="submit" class="button-primary">Kullanıcı Oluştur</button>
                    </form>
                </div>
                <!-- Mevcut Kullanıcılar Listesi -->
                <div class="user-list-container">
                    <h2>Mevcut Kullanıcılar</h2>
                    <div id="user-list">Yükleniyor...</div>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="kullanici-yonetimi.js"></script>
</body>
</html>
